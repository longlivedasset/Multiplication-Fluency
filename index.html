<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Multiplication Fluency</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #F5F1E6;
    --paper-line: #E3DCC9;
    --ink: #16213E;
    --ink-soft: #4A5578;
    --solid: #3F6C51;
    --solid-bg: #DCE9DE;
    --shaky: #C98A2C;
    --shaky-bg: #F3E3C4;
    --new-bg: #FFFFFF;
    --wrong: #A85C32;
    --wrong-bg: #F1DDD1;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    background-image:
      linear-gradient(var(--paper-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--paper-line) 1px, transparent 1px);
    background-size: 28px 28px;
    color:var(--ink);
    font-family:'Quicksand', sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding: 20px 14px 60px;
  }
  .app{width:100%; max-width:560px;}
  header{text-align:center; margin-bottom:14px;}
  header h1{
    font-family:'Space Mono', monospace;
    font-weight:700;
    font-size:1.4rem;
    letter-spacing:0.5px;
    margin:0 0 4px;
  }
  header p{margin:0; color:var(--ink-soft); font-size:0.82rem;}

  .card{
    background:#fff;
    border:1px solid var(--paper-line);
    border-radius:14px;
    padding:14px;
    margin-bottom:14px;
    box-shadow:0 2px 0 var(--paper-line);
  }
  .card-title{
    font-family:'Space Mono', monospace;
    font-size:0.68rem;
    color:var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:1px;
    margin:0 0 10px;
  }

  .range-grid{display:flex; gap:10px; margin-bottom:10px;}
  .range-group{flex:1;}
  .range-group label{font-size:0.72rem; font-weight:600; color:var(--ink-soft); display:block; margin-bottom:4px;}
  .range-inputs{display:flex; align-items:center; gap:5px;}
  .range-inputs input{
    width:100%; padding:7px; border:1.5px solid var(--paper-line);
    border-radius:7px; font-size:0.85rem; text-align:center;
    font-family:'Space Mono', monospace; font-weight:700; color:var(--ink);
  }
  .range-inputs input:focus{outline:none; border-color:var(--ink);}
  .range-dash{color:var(--ink-soft); font-weight:bold; font-size:0.8rem;}

  .presets{display:flex; gap:6px; flex-wrap:wrap;}
  .preset-badge{
    font-size:0.7rem; font-weight:600; background:var(--paper);
    color:var(--ink-soft); padding:5px 9px; border-radius:7px;
    cursor:pointer; border:1px solid var(--paper-line);
  }
  .preset-badge:active{background:var(--paper-line);}

  .mode-tabs{display:flex; gap:5px; margin-bottom:14px; overflow-x:auto;}
  .mode-tab{
    flex-shrink:0; padding:8px 12px; border-radius:9px;
    border:1px solid var(--paper-line); background:#fff;
    color:var(--ink-soft); font-size:0.78rem; font-weight:600;
    cursor:pointer; font-family:'Quicksand';
  }
  .mode-tab.a{background:var(--ink); color:#fff; border-color:var(--ink);}

  .seg{display:flex; background:var(--paper); border-radius:9px; padding:3px; gap:2px; margin-bottom:12px;}
  .seg button{
    flex:1; padding:7px 0; border:none; background:transparent;
    font-size:0.78rem; font-weight:600; color:var(--ink-soft);
    border-radius:7px; cursor:pointer; font-family:'Quicksand';
  }
  .seg button.a{background:#fff; color:var(--ink); box-shadow:0 1px 0 var(--paper-line);}

  .stats-row{display:flex; justify-content:center; gap:8px; margin-bottom:14px; font-family:'Space Mono', monospace; font-size:0.68rem;}
  .stat-pill{display:flex; align-items:center; gap:5px; background:#fff; border:1px solid var(--paper-line); border-radius:18px; padding:4px 9px;}
  .dot{width:8px; height:8px; border-radius:50%; display:inline-block;}
  .dot.new{background:#fff; border:1.5px solid var(--ink-soft);}
  .dot.shaky{background:var(--shaky);}
  .dot.solid{background:var(--solid);}

  table.grid{border-collapse:collapse; width:100%;}
  table.grid td{position:relative; text-align:center; padding:0; border-radius:3px;}
  table.grid th{font-family:'Space Mono', monospace; font-size:0.6rem; color:var(--ink-soft); font-weight:400; padding:2px;}
  .cell{width:100%; aspect-ratio:1/1; border-radius:3px; border:1px solid var(--paper-line); background:var(--new-bg);}
  .cell.shaky{background:var(--shaky-bg); border-color:var(--shaky);}
  .cell.solid{background:var(--solid-bg); border-color:var(--solid);}

  .needs-list{font-size:0.8rem; line-height:1.9;}
  .needs-list .tag{
    display:inline-block; font-family:'Space Mono', monospace; font-size:0.7rem;
    background:var(--shaky-bg); color:var(--shaky); border:1px solid var(--shaky);
    padding:2px 7px; border-radius:6px; margin:2px 4px 2px 0;
  }

  button.btn{
    width:100%; font-family:'Quicksand'; font-weight:600; font-size:0.95rem;
    color:#fff; background:var(--ink); border:none; border-radius:10px;
    padding:13px; cursor:pointer;
  }
  button.btn:disabled{background:#ccc; cursor:not-allowed;}
  button.btn.drill{background:var(--shaky);}

  .practice-card{background:#fff; border:1px solid var(--paper-line); border-radius:14px; padding:22px 18px; text-align:center;}
  .timer-track{height:6px; width:100%; background:var(--paper-line); border-radius:3px; overflow:hidden; margin-bottom:18px;}
  .timer-fill{height:100%; background:var(--ink); width:100%; transition:width 0.05s linear;}
  .timer-fill.late{background:var(--shaky);}
  .equation{font-family:'Space Mono', monospace; font-weight:700; font-size:2.3rem; margin-bottom:16px;}
  input.answer{
    width:120px; font-family:'Space Mono', monospace; font-size:1.5rem; text-align:center;
    padding:8px; border:2px solid var(--ink); border-radius:8px; outline:none;
  }
  input.answer:focus{border-color:var(--solid);}
  .submit-btn{
    display:block; margin:14px auto 0; font-family:'Quicksand'; font-weight:600;
    background:var(--ink); color:#fff; border:none; border-radius:10px;
    padding:9px 20px; font-size:0.9rem; cursor:pointer;
  }
  .feedback{margin-top:14px; font-family:'Space Mono', monospace; font-size:0.82rem; font-weight:700; min-height:1.2em;}
  .feedback.correct{color:var(--solid);}
  .feedback.wrong{color:var(--wrong);}
  .feedback.slow{color:var(--shaky);}

  .progress-label{font-size:0.8rem; color:var(--ink-soft); margin-bottom:2px; text-align:center;}
  .back-link{display:block; margin-top:14px; font-family:'Space Mono', monospace; font-size:0.72rem; color:var(--ink-soft); text-align:center; cursor:pointer;}

  .sixty-timer{font-family:'Space Mono', monospace; font-size:1.6rem; font-weight:700; text-align:center; color:var(--shaky); margin-bottom:8px;}
  .sixty-stats{display:flex; justify-content:space-around; font-size:0.78rem; color:var(--ink-soft); margin-bottom:12px;}
  .sixty-problem{font-family:'Space Mono', monospace; font-weight:700; font-size:2.4rem; text-align:center; margin-bottom:14px;}
  .sixty-fb{text-align:center; font-size:0.8rem; min-height:20px; color:var(--ink-soft); margin-top:8px;}

  .tbl-w{width:100%; overflow-x:auto;}
  table.log{width:100%; border-collapse:collapse; font-size:0.72rem;}
  table.log th{text-align:left; padding:6px 8px; background:var(--paper); color:var(--ink-soft); font-weight:600;}
  table.log td{padding:6px 8px; border-bottom:1px solid var(--paper-line); color:var(--ink-soft);}
  .loading{text-align:center; color:var(--ink-soft); padding:40px 0; font-family:'Space Mono', monospace; font-size:0.8rem;}
  .hint{font-size:0.72rem; color:var(--ink-soft); margin-bottom:10px;}
</style>
</head>
<body>
<div class="app" id="app"><div class="loading">loading…</div></div>

<script>
/* ═══════════ STATE ═══════════ */
const STORAGE_KEY = 'mult-fluency-data-v1';
const FAST_MS = 2000;
const TIMEOUT_MS = 3000;
const SIXTY_FLAG_MS = 3000;
const STACK20_SIZE = 20;
const REVIEW_DAYS = 3;

let RANGE = {min1:2, max1:9, min2:2, max2:9};
let factsDB = {};
let sessionLog = [];
let modeTab = '60sec'; // 60sec | stack20 | stackAll | progress

let stackEngineActive = false;
let secEngineActive = false;

/* ═══ persistence ═══ */
async function loadData(){
  try{
    const res = await window.storage.get(STORAGE_KEY, false);
    if(res && res.value){
      const parsed = JSON.parse(res.value);
      factsDB = parsed.facts || {};
      sessionLog = parsed.log || [];
      if(parsed.range) RANGE = parsed.range;
    }
  } catch(e){ /* nothing saved yet */ }
  render();
}
async function saveData(){
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify({facts:factsDB, log:sessionLog, range:RANGE}), false);
  } catch(e){ console.error('save failed', e); }
}
async function clearAllData(){
  if(!window.confirm('Clear all progress and history? This cannot be undone.')) return;
  factsDB = {}; sessionLog = [];
  await saveData();
  render();
}

/* ═══ fact records ═══ */
function factKey(f1,f2){ return f1+'x'+f2; }
function getFact(f1,f2){
  const k = factKey(f1,f2);
  if(!factsDB[k]) factsDB[k] = {streak:0, attempts:0, wrong:0, last:null};
  return factsDB[k];
}
function statusOf(rec){
  if(rec.streak>=3) return 'solid';
  if(rec.attempts>0) return 'shaky';
  return 'new';
}
function daysSince(dateStr){
  if(!dateStr) return Infinity;
  return Math.floor((Date.now()-new Date(dateStr).getTime())/86400000);
}
function needsReview(rec){
  return rec.streak>=3 && daysSince(rec.last)>=REVIEW_DAYS;
}
function nowISO(){ return new Date().toISOString(); }

function allFactsInRange(){
  const list=[];
  for(let i=RANGE.min1;i<=RANGE.max1;i++){
    for(let j=RANGE.min2;j<=RANGE.max2;j++){
      list.push({f1:i, f2:j, rec:getFact(i,j)});
    }
  }
  return list;
}
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function rangeCounts(){
  const all = allFactsInRange();
  let n=0,s=0,solid=0;
  all.forEach(p=>{
    const st = statusOf(p.rec);
    if(st==='new') n++; else if(st==='shaky') s++; else solid++;
  });
  return {n,s,solid,total:all.length};
}

/* ═══ RANGE CONFIG ═══ */
function applyPreset(min1,max1,min2,max2){
  if(stackEngineActive || secEngineActive) return;
  RANGE = {min1,max1,min2,max2};
  saveData();
  render();
}
function updateRangeField(field, val){
  if(stackEngineActive || secEngineActive) return;
  const n = parseInt(val,10);
  if(isNaN(n)) return;
  RANGE[field] = n;
  if(RANGE.min1 > RANGE.max1) [RANGE.min1, RANGE.max1] = [RANGE.max1, RANGE.min1];
  if(RANGE.min2 > RANGE.max2) [RANGE.min2, RANGE.max2] = [RANGE.max2, RANGE.min2];
  saveData();
  render();
}

/* ═══════════ STACK ENGINE (20-stack / whole-stack) ═══════════ */
let stackKind = '20'; // '20' | 'all'
let deck = [];
let deckSeen = {};
let totalToClear = 0;
let clearedCount = 0;
let currentDrawFirstTry = false;
let currentCard = null;
let startTime = null;
let timerHandle = null;
let resolved = false;
let wrongFlashTimer = null;
let sessionPromotions = [];
let sessionAttempted = 0;

function weightOf(rec){
  const st = statusOf(rec);
  if(st==='solid') return 1;
  if(st==='new') return 6 + rec.wrong*3;
  return 4 + rec.wrong*3;
}
function buildStack20Deck(){
  const all = allFactsInRange();
  const unmastered = all.filter(p=>statusOf(p.rec)!=='solid');
  const review = all.filter(p=>statusOf(p.rec)==='solid' && needsReview(p.rec));
  let pool = weightedSample(unmastered, STACK20_SIZE);
  if(pool.length < STACK20_SIZE){
    pool = pool.concat(shuffle(review).slice(0, STACK20_SIZE-pool.length));
  }
  if(pool.length === 0){
    pool = shuffle(all).slice(0, STACK20_SIZE);
  }
  return pool;
}
function weightedSample(list, n){
  const remaining = list.slice();
  const out = [];
  for(let i=0;i<n && remaining.length>0;i++){
    const total = remaining.reduce((s,p)=>s+weightOf(p.rec),0);
    let r = Math.random()*total;
    let idx=0;
    for(;idx<remaining.length;idx++){
      r -= weightOf(remaining[idx].rec);
      if(r<=0) break;
    }
    idx = Math.min(idx, remaining.length-1);
    out.push(remaining[idx]);
    remaining.splice(idx,1);
  }
  return out;
}
function buildStackAllDeck(){
  return shuffle(allFactsInRange());
}

function startStack(kind){
  stackKind = kind;
  stackEngineActive = true;
  deck = kind === '20' ? buildStack20Deck() : buildStackAllDeck();
  deckSeen = {};
  totalToClear = deck.length;
  clearedCount = 0;
  sessionPromotions = [];
  sessionAttempted = 0;
  currentCard = null;
  modeTab = 'stack-play';
  render();
  nextCard();
}

function nextCard(){
  resolved = false;
  if(deck.length === 0){
    finishStackSession();
    return;
  }
  currentCard = deck.shift();
  const key = factKey(currentCard.f1, currentCard.f2);
  currentDrawFirstTry = !deckSeen[key];
  deckSeen[key] = true;
  startTime = Date.now();
  updateQuestionUI();
  startTimerBar();
}

function startTimerBar(){
  clearInterval(timerHandle);
  timerHandle = setInterval(()=>{
    const elapsed = Date.now() - startTime;
    const f = document.getElementById('timer-fill');
    if(f){
      const pct = Math.max(0, 100 - (elapsed/TIMEOUT_MS)*100);
      f.style.width = pct + '%';
      f.classList.toggle('late', elapsed > FAST_MS);
    }
    if(elapsed >= TIMEOUT_MS){
      submitAnswer(true);
    }
  }, 50);
}

function attemptSubmit(){
  if(resolved) return;
  const input = document.getElementById('answer-input');
  if(!input) return;
  const val = parseInt(input.value, 10);
  if(isNaN(val)) return;
  const product = currentCard.f1 * currentCard.f2;
  const correct = val === product;
  if(!correct){
    markWrongAttempt();
    return;
  }
  submitAnswer(false);
}

function markWrongAttempt(){
  const input = document.getElementById('answer-input');
  const fb = document.getElementById('feedback');
  if(fb){ fb.className='feedback wrong'; fb.textContent='Try again'; }
  if(input){ input.value=''; }
  clearTimeout(wrongFlashTimer);
  wrongFlashTimer = setTimeout(()=>{
    if(!resolved){
      const fb2 = document.getElementById('feedback');
      if(fb2){ fb2.className='feedback'; fb2.textContent=''; }
    }
  }, 500);
}

function submitAnswer(isTimeout){
  if(resolved) return;
  resolved = true;
  clearInterval(timerHandle);

  const input = document.getElementById('answer-input');
  const elapsed = Date.now() - startTime;
  const val = input ? parseInt(input.value, 10) : NaN;
  const product = currentCard.f1 * currentCard.f2;
  const correct = !isTimeout && val === product;
  const rec = currentCard.rec;
  const wasNotSolidBefore = statusOf(rec) !== 'solid';

  rec.attempts++;
  rec.last = nowISO();
  let feedbackClass, feedbackText;

  if(!correct){
    rec.streak = 0;
    rec.wrong++;
    feedbackClass = 'wrong';
    feedbackText = isTimeout
      ? `Time's up — ${currentCard.f1} × ${currentCard.f2} = ${product}`
      : `Not quite — ${currentCard.f1} × ${currentCard.f2} = ${product}`;
    deck.push(currentCard);
  } else {
    if(currentDrawFirstTry && elapsed <= FAST_MS){
      rec.streak++;
      feedbackClass = 'correct';
      feedbackText = 'Fast & correct!';
    } else if(elapsed <= FAST_MS){
      feedbackClass = 'correct';
      feedbackText = 'Got it!';
    } else {
      feedbackClass = 'slow';
      feedbackText = "Correct — let's get faster";
    }
    clearedCount++;
  }
  if(wasNotSolidBefore && statusOf(rec) === 'solid'){
    sessionPromotions.push(currentCard.f1+'×'+currentCard.f2);
  }
  sessionAttempted++;
  saveData();
  flashFeedback(feedbackClass, feedbackText);
  setTimeout(()=>{ nextCard(); }, 350);
}

function flashFeedback(cls, text){
  const fb = document.getElementById('feedback');
  if(fb){ fb.className='feedback '+cls; fb.textContent=text; }
}

function updateQuestionUI(){
  clearTimeout(wrongFlashTimer);
  const eq = document.getElementById('equation');
  if(eq) eq.textContent = `${currentCard.f1} × ${currentCard.f2} = ?`;
  const input = document.getElementById('answer-input');
  if(input){
    input.value = '';
    if(document.activeElement !== input) input.focus();
  }
  const fb = document.getElementById('feedback');
  if(fb){ fb.className='feedback'; fb.textContent=''; }
  const fill = document.getElementById('timer-fill');
  if(fill){ fill.style.width='100%'; fill.classList.remove('late'); }
  updateProgressLabel();
}
function updateProgressLabel(){
  const el = document.getElementById('progress-label');
  if(el) el.textContent = `Cleared ${clearedCount} / ${totalToClear}`;
}

function endStackSessionEarly(){
  clearInterval(timerHandle);
  finishStackSession();
}
function finishStackSession(){
  stackEngineActive = false;
  clearInterval(timerHandle);
  sessionLog.unshift({
    ts: new Date().toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}),
    type: stackKind === '20' ? '20 Stack' : 'Whole Stack',
    detail: `${clearedCount}/${totalToClear} cleared · ${sessionAttempted} attempts`
  });
  sessionLog = sessionLog.slice(0,30);
  saveData();
  modeTab = 'stack-summary';
  render();
}

/* ═══════════ 60-SECOND DRILL ═══════════ */
const sec = {
  score:0, total:0, timeLeft:60, timerId:null,
  currentAnswer:0, opMode:'multiplication', activeOp:'multiplication',
  currentF1:0, currentF2:0, qStart:0, flagged:[]
};

function secGenerateProblem(){
  const f1 = Math.floor(Math.random()*(RANGE.max1-RANGE.min1+1))+RANGE.min1;
  const f2 = Math.floor(Math.random()*(RANGE.max2-RANGE.min2+1))+RANGE.min2;
  sec.currentF1 = f1; sec.currentF2 = f2;
  let op = sec.opMode;
  if(op === 'mixed') op = Math.random()<0.5 ? 'multiplication' : 'division';
  sec.activeOp = op;
  const disp = document.getElementById('sixty-problem');
  if(op === 'multiplication'){
    sec.currentAnswer = f1*f2;
    if(disp) disp.textContent = `${f1} × ${f2}`;
  } else {
    const dividend = f1*f2;
    sec.currentAnswer = f1;
    if(disp) disp.textContent = `${dividend} ÷ ${f2}`;
  }
  const input = document.getElementById('sixty-input');
  if(input){ input.value=''; if(document.activeElement!==input) input.focus(); }
  sec.qStart = Date.now();
}

function secSetOp(m){
  if(secEngineActive) return;
  sec.opMode = m;
  render();
}

function secStart(){
  secEngineActive = true;
  sec.score=0; sec.total=0; sec.timeLeft=60; sec.flagged=[];
  modeTab = 'sixty-play';
  render();
  secGenerateProblem();
  sec.timerId = setInterval(()=>{
    sec.timeLeft--;
    const t = document.getElementById('sixty-timer');
    if(t) t.textContent = sec.timeLeft+'s';
    if(sec.timeLeft<=0) secEnd();
  }, 1000);
}

function secHandleCorrect(){
  const elapsed = Date.now()-sec.qStart;
  sec.score++; sec.total++;
  const rec = getFact(sec.currentF1, sec.currentF2);
  rec.attempts++;
  rec.last = nowISO();
  if(elapsed > SIXTY_FLAG_MS){
    rec.streak = 0; rec.wrong++;
    sec.flagged.push({f1:sec.currentF1, f2:sec.currentF2, elapsed, wrong:false});
  }
  saveData();
  secUpdateStatsUI();
  secGenerateProblem();
}
function secHandleWrong(){
  sec.total++;
  const rec = getFact(sec.currentF1, sec.currentF2);
  rec.attempts++; rec.streak=0; rec.wrong++; rec.last = nowISO();
  sec.flagged.push({f1:sec.currentF1, f2:sec.currentF2, elapsed:Date.now()-sec.qStart, wrong:true});
  saveData();
  secUpdateStatsUI();
  secGenerateProblem();
}
function secUpdateStatsUI(){
  const c = document.getElementById('sixty-correct');
  const a = document.getElementById('sixty-accuracy');
  if(c) c.textContent = sec.score;
  if(a) a.textContent = sec.total ? Math.round(sec.score/sec.total*100)+'%' : '0%';
}
function secEnd(){
  secEngineActive = false;
  clearInterval(sec.timerId);
  const acc = sec.total ? Math.round(sec.score/sec.total*100) : 0;
  sessionLog.unshift({
    ts: new Date().toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}),
    type: '60 Sec Drill',
    detail: `${sec.score}/${sec.total} · ${acc}% · ${sec.opMode}`
  });
  sessionLog = sessionLog.slice(0,30);
  saveData();
  modeTab = 'sixty-summary';
  render();
}

/* ═══════════ RENDER ═══════════ */
function rangeConfigHTML(){
  const disabled = (stackEngineActive || secEngineActive);
  return `
    <div class="card">
      <p class="card-title">Fact Range</p>
      <div class="range-grid">
        <div class="range-group">
          <label>Factor 1</label>
          <div class="range-inputs">
            <input type="number" value="${RANGE.min1}" ${disabled?'disabled':''} onchange="updateRangeField('min1', this.value)">
            <span class="range-dash">–</span>
            <input type="number" value="${RANGE.max1}" ${disabled?'disabled':''} onchange="updateRangeField('max1', this.value)">
          </div>
        </div>
        <div class="range-group">
          <label>Factor 2</label>
          <div class="range-inputs">
            <input type="number" value="${RANGE.min2}" ${disabled?'disabled':''} onchange="updateRangeField('min2', this.value)">
            <span class="range-dash">–</span>
            <input type="number" value="${RANGE.max2}" ${disabled?'disabled':''} onchange="updateRangeField('max2', this.value)">
          </div>
        </div>
      </div>
      <div class="presets">
        <span class="preset-badge" onclick="applyPreset(2,9,2,9)">Single Digits (2-9)</span>
        <span class="preset-badge" onclick="applyPreset(1,12,1,12)">Classic Tables (1-12)</span>
        <span class="preset-badge" onclick="applyPreset(11,19,1,9)">Teens Blend</span>
        <span class="preset-badge" onclick="applyPreset(10,99,2,9)">Double × Single</span>
      </div>
    </div>
  `;
}

function modeTabsHTML(active){
  const tabs = [
    ['60sec','60 Sec Drill'],
    ['stack20','20 Stack'],
    ['stackAll','Whole Stack'],
    ['progress','Progress']
  ];
  return `<div class="mode-tabs">${tabs.map(([k,label])=>
    `<button class="mode-tab ${active===k?'a':''}" onclick="switchModeTab('${k}')">${label}</button>`
  ).join('')}</div>`;
}

function switchModeTab(tab){
  if(stackEngineActive || secEngineActive) return; // must end session first
  modeTab = tab;
  render();
}

function renderMasteryGrid(){
  const rows1 = RANGE.max1-RANGE.min1+1;
  const cols2 = RANGE.max2-RANGE.min2+1;
  if(rows1 * cols2 > 180){
    const all = allFactsInRange();
    const needsWork = all.filter(p=>statusOf(p.rec)!=='solid')
      .sort((a,b)=> b.rec.wrong - a.rec.wrong)
      .slice(0,16);
    if(needsWork.length===0){
      return `<div class="needs-list">Everything in this range is solid. 🎉</div>`;
    }
    return `<div class="needs-list">Needs practice:<br>${needsWork.map(p=>`<span class="tag">${p.f1}×${p.f2}</span>`).join('')}</div>`;
  }
  let html = '<table class="grid"><tr><th></th>';
  for(let j=RANGE.min2;j<=RANGE.max2;j++) html += `<th>${j}</th>`;
  html += '</tr>';
  for(let i=RANGE.min1;i<=RANGE.max1;i++){
    html += `<tr><th>${i}</th>`;
    for(let j=RANGE.min2;j<=RANGE.max2;j++){
      const rec = getFact(i,j);
      html += `<td><div class="cell ${statusOf(rec)}"></div></td>`;
    }
    html += '</tr>';
  }
  html += '</table>';
  return html;
}

function renderLogTable(){
  if(sessionLog.length===0) return '<p style="font-size:0.78rem;color:var(--ink-soft);">No sessions yet.</p>';
  return `<div class="tbl-w"><table class="log"><thead><tr><th>Date</th><th>Type</th><th>Result</th></tr></thead><tbody>
    ${sessionLog.map(r=>`<tr><td>${r.ts}</td><td>${r.type}</td><td>${r.detail}</td></tr>`).join('')}
  </tbody></table></div>`;
}

function render(){
  const app = document.getElementById('app');

  if(modeTab === 'stack-play'){
    app.innerHTML = `
      <header><h1>Multiplication Fluency</h1><p id="progress-label" class="progress-label"></p></header>
      <div class="practice-card">
        <div class="timer-track"><div class="timer-fill" id="timer-fill"></div></div>
        <div class="equation" id="equation"></div>
        <input type="number" id="answer-input" class="answer" autocomplete="off" inputmode="numeric" />
        <button class="submit-btn" onclick="attemptSubmit()">Check</button>
        <div class="feedback" id="feedback"></div>
      </div>
      <a class="back-link" onclick="endStackSessionEarly()">End session &amp; see summary</a>
    `;
    const input = document.getElementById('answer-input');
    if(input){
      input.addEventListener('keydown', (e)=>{ if(e.key==='Enter') attemptSubmit(); });
      input.addEventListener('input', ()=>{
        if(resolved || !currentCard) return;
        const expectedDigits = String(currentCard.f1*currentCard.f2).length;
        if(input.value.length >= expectedDigits) attemptSubmit();
      });
    }
    return;
  }

  if(modeTab === 'stack-summary'){
    app.innerHTML = `
      <header><h1>Multiplication Fluency</h1></header>
      <div class="card" style="text-align:center;">
        <p class="card-title">Session Done</p>
        <p style="font-size:0.85rem;">${clearedCount} / ${totalToClear} cleared &middot; ${sessionAttempted} total attempts</p>
        <p style="font-size:0.8rem; color:var(--ink-soft);">${sessionPromotions.length ? 'Promoted to solid: '+sessionPromotions.join(', ') : "No new facts hit solid this time — that's okay."}</p>
      </div>
      <div class="card">
        <p class="card-title">Mastery — Current Range</p>
        ${renderMasteryGrid()}
      </div>
      <a class="back-link" onclick="modeTab='progress';render();">Back to menu</a>
    `;
    return;
  }

  if(modeTab === 'sixty-play'){
    app.innerHTML = `
      <header><h1>Multiplication Fluency</h1></header>
      <div class="practice-card">
        <div class="sixty-timer" id="sixty-timer">60s</div>
        <div class="sixty-stats">
          <span>Correct: <span id="sixty-correct">0</span></span>
          <span>Accuracy: <span id="sixty-accuracy">0%</span></span>
        </div>
        <div class="sixty-problem" id="sixty-problem">? × ?</div>
        <input type="number" id="sixty-input" class="answer" autocomplete="off" inputmode="numeric" />
        <div class="sixty-fb" id="sixty-fb"></div>
      </div>
    `;
    const input = document.getElementById('sixty-input');
    if(input){
      input.addEventListener('input', ()=>{
        const val = parseInt(input.value,10);
        if(!isNaN(val) && val === sec.currentAnswer) secHandleCorrect();
      });
      input.addEventListener('keydown', (e)=>{
        if(e.key==='Enter'){
          const val = parseInt(input.value,10);
          if(input.value!=='' && val !== sec.currentAnswer) secHandleWrong();
        }
      });
    }
    return;
  }

  if(modeTab === 'sixty-summary'){
    const acc = sec.total ? Math.round(sec.score/sec.total*100) : 0;
    const uniqueFlags = {};
    sec.flagged.forEach(f=>{
      const k = factKey(f.f1,f.f2);
      if(!uniqueFlags[k] || f.wrong) uniqueFlags[k] = f;
    });
    const flagList = Object.values(uniqueFlags);
    app.innerHTML = `
      <header><h1>Multiplication Fluency</h1></header>
      <div class="card" style="text-align:center;">
        <p class="card-title">Drill Complete</p>
        <p style="font-size:0.85rem;">${sec.score} correct out of ${sec.total} &middot; ${acc}% accuracy</p>
        ${flagList.length ? `<div class="needs-list" style="text-align:left;margin-top:8px;">Flagged (slow or wrong):<br>${flagList.map(f=>`<span class="tag">${f.f1}×${f.f2}${f.wrong?' ✕':' '+(f.elapsed/1000).toFixed(1)+'s'}</span>`).join('')}</div>` : '<p style="font-size:0.78rem;color:var(--ink-soft);">Nothing flagged — nice work.</p>'}
      </div>
      <a class="back-link" onclick="modeTab='60sec';render();">Back to menu</a>
    `;
    return;
  }

  // menu-style tabs share range config + tab nav
  let body = rangeConfigHTML() + modeTabsHTML(modeTab);

  if(modeTab === '60sec'){
    body += `
      <div class="card">
        <p class="card-title">Operation</p>
        <div class="seg">
          <button class="${sec.opMode==='multiplication'?'a':''}" onclick="secSetOp('multiplication')">Multiplication</button>
          <button class="${sec.opMode==='division'?'a':''}" onclick="secSetOp('division')">Division</button>
          <button class="${sec.opMode==='mixed'?'a':''}" onclick="secSetOp('mixed')">Mixed</button>
        </div>
        <p class="hint">60 seconds, unlimited questions. Anything answered correctly but slower than 3 sec (or wrong) gets flagged and knocked back to shaky in the mastery data.</p>
        <button class="btn" onclick="secStart()">Start 60s Drill</button>
      </div>
    `;
  } else if(modeTab === 'stack20'){
    const c = rangeCounts();
    body += `
      <div class="card">
        <p class="card-title">20 Stack</p>
        <p class="hint">Pulls 20 facts weighted toward new &amp; shaky, plus anything mastered but not seen in ${REVIEW_DAYS}+ days. 3 sec per card, retry allowed until time runs out.</p>
        <div class="stats-row">
          <span class="stat-pill"><span class="dot new"></span>${c.n} new</span>
          <span class="stat-pill"><span class="dot shaky"></span>${c.s} shaky</span>
          <span class="stat-pill"><span class="dot solid"></span>${c.solid} solid</span>
        </div>
        <button class="btn drill" onclick="startStack('20')">Start 20 Stack</button>
      </div>
    `;
  } else if(modeTab === 'stackAll'){
    const c = rangeCounts();
    body += `
      <div class="card">
        <p class="card-title">Whole Stack</p>
        <p class="hint">All ${c.total} facts in the current range, shuffled. Same timing &amp; mastery rules as 20 Stack.</p>
        <button class="btn drill" onclick="startStack('all')">Start Whole Stack (${c.total})</button>
      </div>
    `;
  } else if(modeTab === 'progress'){
    const c = rangeCounts();
    body += `
      <div class="card">
        <p class="card-title">Mastery — Current Range</p>
        <div class="stats-row">
          <span class="stat-pill"><span class="dot new"></span>${c.n} new</span>
          <span class="stat-pill"><span class="dot shaky"></span>${c.s} shaky</span>
          <span class="stat-pill"><span class="dot solid"></span>${c.solid} solid</span>
        </div>
        ${renderMasteryGrid()}
      </div>
      <div class="card">
        <p class="card-title">Session Log</p>
        ${renderLogTable()}
      </div>
      <a class="back-link" onclick="clearAllData()">Reset all progress &amp; history</a>
    `;
  }

  app.innerHTML = `<header><h1>Multiplication Fluency</h1></header>` + body;
}

loadData();
</script>
</body>
</html>
